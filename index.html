<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

canvas{
  position:absolute;
  top:0;
  left:0;
}

  #sorry{
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%); 
  max-width:80%;   
  max-height:80%;  
  object-fit:contain; 
  display:none;
  opacity:0;
  transition: opacity 2s ease-in;
}
}
</style>
</head>

<body>

<canvas id="heart"></canvas>
<img id="sorry" src="sorry.jpg">

<script>
var canvas = document.getElementById("heart");
var ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

var text = "I love you ";
var particles = [];

// دالة رسم شكل القلب
function heart(t){
  return {
    x:15*Math.pow(Math.sin(t),3),
    y:12*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  };
}

// إنشاء الجسيمات داخل القلب
for(var i=0;i<1000;i++){
  var t = Math.random()*Math.PI*2;
  var pos = heart(t);
  particles.push({
    x:canvas.width/2 + pos.x*20,
    y:canvas.height/2 - pos.y*20,
    text:text,
    alpha:Math.random()
  });
}

// رسم الجسيمات
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "pink";
  ctx.font = "14px Arial";

  particles.forEach(function(p){
    ctx.globalAlpha = p.alpha;
    ctx.fillText(p.text,p.x,p.y);
    p.alpha += 0.01;
    if(p.alpha > 1) p.alpha = 0.2;
  });

  requestAnimationFrame(draw);
}

draw();

// بعد 6 ثواني يختفي الكانفاس وتظهر الصورة تدريجيًا
setTimeout(function(){
  canvas.style.display = "none";
  var img = document.getElementById("sorry");
  img.style.display = "block";
  setTimeout(function(){
    img.style.opacity = 1;
  }, 50);
},6000);

</script>

</body>
</html>
